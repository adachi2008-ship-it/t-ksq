<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Luxury 家計簿</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- 📊 グラフ描画ライブラリを上質に統合 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700&family=Noto+Sans+JP:wght=400;500;700&display=swap');

        :root {
            /* 静かで深い洗練された高級感（クワイエット・ラグジュアリー） */
            --bg-gradient: radial-gradient(circle at 50% 0%, #161925 0%, #0b0c10 100%);
            --panel-bg: rgba(22, 25, 37, 0.7);
            --panel-border: rgba(255, 255, 255, 0.08);
            --panel-shadow: 0 16px 40px rgba(0, 0, 0, 0.5);
            
            /* 落ち着きのある大人のカラーパレット */
            --gold-premium: #dfba73;
            --gold-gradient: linear-gradient(135deg, #e5c07b 0%, #b38938 100%);
            --primary: #9d8df1;
            --income: #4ade80;
            --flex: #f43f5e;
            --text-main: #f8fafc;
            --text-muted: #64748b;
            
            --transition-smooth: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', 'Noto Sans JP', sans-serif; }
        
        body { 
            background: var(--bg-gradient); 
            background-attachment: fixed; 
            color: var(--text-main); 
            padding-bottom: 100px; 
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        
        /* 📱 スマート＆シンプルなボトムナビ */
        .app-nav {
            display: flex; justify-content: space-around; align-items: center;
            background: rgba(11, 12, 16, 0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--panel-border); border-radius: 20px;
            padding: 10px; box-shadow: 0 20px 40px rgba(0,0,0,0.7);
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 400px; z-index: 1000;
        }
        .nav-item {
            background: none; border: none; color: var(--text-muted); font-size: 0.75rem; font-weight: 500;
            display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; flex: 1;
            padding: 8px 0; border-radius: 12px; transition: var(--transition-smooth);
        }
        .nav-item i { font-size: 1.25rem; transition: var(--transition-smooth); }
        .nav-item:hover { color: var(--text-main); }
        .nav-item.active { color: var(--gold-premium); }
        .nav-item.active i { transform: translateY(-2px); color: var(--gold-premium); }

        /* 👑 ページ切り替えは滑らかに */
        .app-page { display: none; padding: 20px; max-width: 1200px; margin: 0 auto; opacity: 0; transform: translateY(10px); transition: var(--transition-smooth); }
        .app-page.active { display: block; opacity: 1; transform: translateY(0); }

        /* 上質なミニマルパネル */
        .panel { 
            background: var(--panel-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--panel-border); border-radius: 20px; padding: 24px; 
            box-shadow: var(--panel-shadow); margin-bottom: 24px; 
            transition: var(--transition-smooth);
        }
        .panel:hover { 
            border-color: rgba(255,255,255,0.15); 
        }
        h2 { font-size: 1.1rem; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; font-weight: 600; letter-spacing: 0.5px; }

        /* 👑 VIP総資産ボード */
        .asset-card {
            background: linear-gradient(135deg, #1a1c23 0%, #0d0e12 100%);
            border: 1px solid rgba(223, 186, 115, 0.2); border-radius: 20px; padding: 24px; margin-bottom: 16px;
            box-shadow: var(--panel-shadow); display: flex; justify-content: space-between; align-items: center;
        }
        .asset-label { font-size: 0.8rem; color: var(--text-muted); font-weight: 600; letter-spacing: 1px; }
        .asset-val { 
            font-size: 2.4rem; font-weight: 700; margin-top: 4px; 
            color: var(--gold-premium);
        }

        /* 🔗 アプリランチャー（新設） */
        .app-launcher-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .launcher-btn { 
            display: flex; flex-direction: column; align-items: center; gap: 6px; 
            background: rgba(0,0,0,0.2); border: 1px solid var(--panel-border); 
            padding: 12px 4px; border-radius: 14px; text-decoration: none; color: var(--text-main); 
            font-size: 0.75rem; font-weight: 500; transition: var(--transition-smooth);
        }
        .launcher-btn:hover { border-color: var(--gold-premium); background: rgba(255,255,255,0.04); }
        .launcher-btn i { font-size: 1.3rem; }

        /* 柔軟な2カラムレイアウト */
        .calendar-container { display: grid; grid-template-columns: 1fr 360px; gap: 24px; }
        @media (max-width: 992px) { .calendar-container { grid-template-columns: 1fr; } }

        /* 💡 提案＆AI執事 */
        .suggest-card { background: linear-gradient(135deg, rgba(157, 141, 241, 0.05), rgba(0,0,0,0)); }
        .suggest-price { font-size: 2.2rem; font-weight: 700; margin: 8px 0; color: var(--text-main); }
        .ai-box { background: rgba(0, 0, 0, 0.3); padding: 16px; border-radius: 14px; margin-top: 16px; text-align: left; font-size: 0.85rem; line-height: 1.5; display: flex; gap: 12px; border-left: 3px solid var(--gold-premium); }

        /* サマリーと美しいプログレスバー */
        .summary-box { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 16px; }
        .sum-item { background: rgba(0,0,0,0.2); padding: 14px 8px; border-radius: 14px; text-align: center; font-size: 0.8rem; border: 1px solid var(--panel-border); }
        .sum-val { font-weight: 700; font-size: 1.1rem; margin-top: 4px; }

        .progress-container { margin-top: 14px; background: rgba(255,255,255,0.05); height: 6px; border-radius: 3px; overflow: hidden; }
        .progress-bar { background: var(--gold-gradient); height: 100%; width: 0%; transition: width 0.6s ease; }
        
        .cat-list { margin-top: 16px; display: flex; flex-direction: column; gap: 12px; }
        .cat-row { display: flex; justify-content: space-between; font-size: 0.9rem; padding: 8px 0; border-bottom: 1px solid var(--panel-border); }

        /* 🗓️ カレンダーUI */
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .month-nav-btn { background: rgba(255,255,255,0.05); color: var(--text-main); border: 1px solid var(--panel-border); padding: 8px 16px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: var(--transition-smooth); }
        .month-nav-btn:hover { background: rgba(255,255,255,0.1); }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .weekday { text-align: center; font-weight: 600; font-size: 0.75rem; color: var(--text-muted); padding: 8px 0; }
        .weekday.sun { color: var(--flex); }
        .weekday.sat { color: #38bdf8; }

        .day-cell { background: rgba(0,0,0,0.15); border: 1px solid var(--panel-border); border-radius: 12px; min-height: 100px; padding: 8px; display: flex; flex-direction: column; justify-content: space-between; transition: var(--transition-smooth); }
        .day-cell:hover { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.2); }
        .day-cell.today { border-color: var(--gold-premium); background: rgba(223, 186, 115, 0.05); }
        .day-num { font-weight: 600; font-size: 0.85rem; color: var(--text-muted); }
        .day-cell.today .day-num { color: var(--gold-premium); font-weight: 700; }
        
        .day-events { display: flex; flex-direction: column; gap: 4px; margin-top: 6px; }
        
        /* イベントタグ */
        .event-tag { font-size: 0.7rem; padding: 3px 6px; border-radius: 6px; color: white; font-weight: 600; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; cursor: pointer; text-align: center; }
        .tag-fixed-in { background: rgba(74, 222, 128, 0.15); color: var(--income); border: 1px solid rgba(74, 222, 128, 0.3); }
        .tag-fixed-out { background: rgba(100, 116, 139, 0.15); color: #94a3b8; border: 1px solid rgba(100, 116, 139, 0.3); }
        .tag-flex { background: rgba(244, 63, 94, 0.15); color: var(--flex); border: 1px solid rgba(244, 63, 14, 0.3); }
        .day-photo-preview { width: 100%; height: 24px; object-fit: cover; border-radius: 4px; margin-top: 2px; }
        .tag-schedule {

    background: rgba(56, 189, 248, 0.15);

    color: #38bdf8;

    border: 1px solid rgba(56, 189, 248, 0.35);

}

        /* フォーム */
        .form-wrapper { max-width: 600px; margin: 0 auto; }
        .entry-tabs { display: flex; background: rgba(0,0,0,0.2); border-radius: 12px; padding: 4px; margin-bottom: 20px; border: 1px solid var(--panel-border); }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; border-radius: 9px; cursor: pointer; font-size: 0.9rem; font-weight: 600; color: var(--text-muted); transition: var(--transition-smooth); }
        .tab-btn.active { background: rgba(255,255,255,0.08); color: var(--text-main); }
        
        label { font-size: 0.85rem; color: var(--text-muted); font-weight: 500; display: block; margin-bottom: 8px; }
        input, select { width: 100%; padding: 14px; border: 1px solid var(--panel-border); border-radius: 12px; background: rgba(0,0,0,0.2); color: var(--text-main); font-size: 1rem; margin-bottom: 20px; transition: var(--transition-smooth); }
        input:focus, select:focus { outline: none; border-color: var(--gold-premium); background: rgba(0,0,0,0.4); }
        
        /* 📸 レシートアップロードゾーン */
        .camera-upload-zone { display: flex; align-items: center; justify-content: center; gap: 10px; background: rgba(0,0,0,0.1); border: 1px dashed var(--panel-border); padding: 20px; border-radius: 12px; cursor: pointer; color: var(--text-muted); font-size: 0.9rem; transition: var(--transition-smooth); }
        .camera-upload-zone:hover { border-color: var(--gold-premium); color: var(--text-main); background: rgba(255,255,255,0.02); }
        #photo-preview-form { display: none; width: 100%; max-height: 180px; object-fit: contain; margin-top: 14px; border-radius: 12px; }
        
        .btn-main { 
            width: 100%; padding: 16px; border: none; border-radius: 12px; 
            background: var(--gold-gradient); color: #0b0c10; font-weight: 600; cursor: pointer; font-size: 1rem; 
            letter-spacing: 0.5px; transition: var(--transition-smooth);
        }
        .btn-main:hover { opacity: 0.9; transform: translateY(-1px); }

        /* 割り勘セクション */
        .game-tabs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; background: rgba(0,0,0,0.2); padding: 4px; border-radius: 12px; border: 1px solid var(--panel-border); }
        .game-tab-btn { border: none; background: none; padding: 12px 4px; font-size: 0.85rem; font-weight: 600; border-radius: 9px; cursor: pointer; color: var(--text-muted); transition: var(--transition-smooth); }
        .game-tab-btn.active { background: rgba(255,255,255,0.08); color: var(--gold-premium); }
        .split-res-box { display: none; margin-top: 20px; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 16px; border: 1px solid var(--panel-border); }
        .result-list-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.02); font-size: 0.95rem; }
        /* アプリ管理・削除用の追加スタイル */
        .launcher-btn { position: relative; }
        .delete-app-btn { position: absolute; top: -5px; right: -5px; background: var(--flex); color: white; border: none; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; cursor: pointer; display: none; }
        .managing .delete-app-btn { display: flex; align-items: center; justify-content: center; }   
    </style>
</head>
<body>

<!-- 🗓️ 1. カレンダー画面 -->
<div id="page-calendar" class="app-page active">
    
    <!-- VIP総資産ボード -->
    <div class="asset-card">
        <div>
            <p class="asset-label"><i class="fa-solid fa-wallet" style="color: var(--gold-premium); margin-right: 6px;"></i> 総資産残高</p>
            <h1 class="asset-val" id="total-asset-val">¥0</h1>
        </div>
        <i class="fa-solid fa-shield-halved" style="font-size: 2.5rem; color: rgba(255,255,255,0.05);"></i>
    </div>

    <div class="panel" id="launcher-panel" style="padding: 18px; margin-bottom: 24px; position: relative;">
    
    <h2 style="font-size: 0.9rem; margin-bottom: 12px; display: inline-flex; align-items: flex-start; gap: 4px; position: relative; padding-right: 24px;">
        <span><i class="fa-solid fa-arrow-up-right-from-square" style="color: var(--gold-premium);"></i> クイックアプリ起動</span>
        <button onclick="toggleAppManagement()" style="position: absolute; top: -2px; right: 0; font-size: 0.65rem; background: none; border: 1px solid var(--panel-border); color: var(--text-muted); padding: 1px 4px; border-radius: 4px; cursor: pointer; transition: var(--transition-smooth);">⚙️</button>
    </h2>

    <div class="app-launcher-grid" id="app-grid">
        </div>

    <div id="add-app-form" style="display: none; margin-top: 12px; padding: 8px; background: rgba(0,0,0,0.4); border: 1px dashed rgba(223, 186, 115, 0.3); border-radius: 10px;">
        <input type="text" id="app-search-input" placeholder="アプリ名で検索して追加（例: Vポイント、au PAY）" oninput="searchPresetApps()" style="width: 100%; padding: 8px 12px; font-size: 0.8rem; background: rgba(0,0,0,0.3); border: 1px solid var(--panel-border); color: #fff; border-radius: 8px; margin: 0 0 8px 0;">
        
        <div id="search-results-pool" style="display: flex; flex-wrap: wrap; gap: 6px; max-height: 120px; overflow-y: auto; padding: 2px;">
            </div>
    </div>
</div>
    <div class="calendar-container">
        
        <!-- 左側カラム: カレンダー本体 & 下部に支出グラフ -->
        <div class="left-column">
            <!-- カレンダーパネル -->
            <div class="panel">
                <div class="calendar-header">
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <button class="month-nav-btn" onclick="changeMonth(-1)"><i class="fa-solid fa-angle-left"></i></button>
                        <h2 style="margin-bottom: 0; font-size: 1.25rem; font-weight:700;" id="calendar-month-title">2026 / 07</h2>
                        <button class="month-nav-btn" onclick="changeMonth(1)"><i class="fa-solid fa-angle-right"></i></button>
                    </div>
                    
                    <button class="month-nav-btn" style="color: var(--gold-premium); border-color: rgba(223,186,115,0.3);" onclick="autoInjectFixedCosts()">
                        固定費を自動反映
                    </button>
                </div>
                <div class="calendar-grid" id="calendar-grid"></div>
            </div>

            <!-- 📊 支出分析グラフパネル -->
            <div class="panel">
                <h2><i class="fa-solid fa-chart-pie" style="color: var(--gold-premium);"></i> 今月の支出内訳（資産分析）</h2>
                <div style="position: relative; max-width: 320px; margin: 0 auto; height: 260px;">
                    <canvas id="expenseChart"></canvas>
                </div>
            </div>
        </div>

        <!-- 右側カラム: サイド情報パネル -->
        <div class="sidebar">
            <div class="panel suggest-card">
                <p style="font-size: 0.8rem; font-weight: 600; color: var(--text-muted); letter-spacing: 0.5px;">本日の推奨利用額</p>
                <div class="suggest-price" id="suggest-amt">¥0</div>
                <p style="opacity: 0.5; font-size: 0.75rem;" id="suggest-desc">(今月の残金 ÷ 残り日数)</p>
                
                <!-- AIアドバイザー -->
                <div class="ai-box">
                    <i class="fa-solid fa-circle-user" style="font-size: 1.2rem; color: var(--gold-premium); margin-top: 2px;"></i>
                    <div>
                        <strong style="color: var(--gold-premium); display: block; margin-bottom: 4px; font-size: 0.8rem; font-weight:600;">AIコンシェルジュ</strong>
                        <span id="ai-advisor-text" style="color: #cbd5e1;">データを入力すると、今月のインサイトを表示します。</span>
                    </div>
                </div>
            </div>
            
            <div class="panel">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h2 style="margin-bottom:0; font-size: 0.95rem;"><i class="fa-solid fa-chart-line" style="color: var(--primary);"></i> 今月の予算利用率</h2>
                    <span id="budget-percent" style="font-size:0.95rem; font-weight:700; color:var(--gold-premium);">0%</span>
                </div>
                <div class="progress-container"><div class="progress-bar" id="budget-progress"></div></div>
                
                <h2 style="margin-top: 24px; margin-bottom: 4px; font-size: 0.95rem;"><i class="fa-solid fa-tags" style="color: var(--primary);"></i> カテゴリ別支出</h2>
                <div class="cat-list" id="category-summary-list"></div>
            </div>

            <div class="panel">
                <h2 style="font-size: 0.95rem;"><i class="fa-solid fa-receipt" style="color: var(--gold-premium);"></i> 収支概況</h2>
                <div class="summary-box">
                    <div class="sum-item"><div>収入</div><div class="sum-val" id="sum-income" style="color: var(--income);">¥0</div></div>
                    <div class="sum-item"><div>支出</div><div class="sum-val" id="sum-expense" style="color: var(--flex);">¥0</div></div>
                    <div class="sum-item"><div>貯蓄</div><div class="sum-val" id="sum-savings" style="color: var(--gold-premium);">¥0</div></div>
                </div>
                <button onclick="clearAllData()" style="width:100%; border:none; background:none; color:var(--text-muted); font-size:0.75rem; margin-top:20px; cursor:pointer; text-decoration: underline;">データをリセット</button>
            </div>
        </div>
    </div>
</div>

<!-- ✍️ 2. 入力画面 -->
<div id="page-add" class="app-page">
    <div class="form-wrapper">
        <div class="panel">
            <h2 style="font-size: 1.2rem; margin-bottom: 20px;"><i class="fa-solid fa-pen-to-square" style="color: var(--gold-premium);"></i> 取引データの記録</h2>
            <div class="entry-tabs">
    <button class="tab-btn active" onclick="setMode('flex', this)">変動費</button>
    <button class="tab-btn" onclick="setMode('fixed-in', this)">収入</button>
    <button class="tab-btn" onclick="setMode('fixed-out', this)">固定費</button>
    <button class="tab-btn" onclick="setMode('schedule', this)">予定</button>
            </div>
            
            <form id="main-form">
                <div><label>日付</label><input type="date" id="form-date" required></div>
                
                <div id="category-selector-wrapper" style="margin-top: 20px;">
                    <label>カテゴリー</label>
                    <select id="form-category">
                        <option value="食費・交際">🍽️ 食費・交際</option>
                        <option value="エンタメ・趣味">🥂 エンタメ・趣味</option>
                        <option value="ショッピング">🛍️ ショッピング</option>
                        <option value="交通費">🚕 交通費</option>
                        <option value="その他">📦 その他</option>
                    </select>
                </div>
                <div><label id="label-title">摘要・メモ</label><input type="text" id="form-title" placeholder="例: クライアント会食" required></div>
                <div id="amount-wrapper">
    <label>金額 (¥)</label>
    <input type="number" id="form-amount" placeholder="0" min="0" required>
                </div>
                <button type="submit" class="btn-main" id="btn-submit">この内容で登録する</button>
            </form>
        </div>
    </div>
</div>

<!-- 👥 3. 精算画面 -->
<div id="page-split" class="app-page">
    <div class="form-wrapper">
        <div class="panel">
            <h2 style="font-size: 1.2rem; margin-bottom: 20px;"><i class="fa-solid fa-circle-dollar-to-slot" style="color: var(--gold-premium);"></i> スマート精算・割り勘</h2>
            <div class="game-tabs">
                <button class="game-tab-btn active" id="g-tab-normal" onclick="setGameMode('normal')">⚖️ 通常割り勘</button>
                <button class="game-tab-btn" id="g-tab-gochi" onclick="setGameMode('gochi')">👑 ゴチ支払い</button>
                <button class="game-tab-btn" id="g-tab-roulette" onclick="setGameMode('roulette')">🎲 ルーレット</button>
            </div>
            <div><label>合計金額 (¥)</label><input type="number" id="split-total" placeholder="0" min="0"></div>
            <div>
                <label>参加メンバー (カンマ区切り)</label>
                <input type="text" id="split-members" value="自分, メンバー1, メンバー2">
            </div>
            <div id="normal-ratio-wrapper">
                <label>自分の傾斜設定</label>
                <select id="split-ratio">
                    <option value="1">均等 (1.0倍)</option>
                    <option value="1.5">多めに払う (1.5倍)</option>
                    <option value="2">多めに払う (2.0倍)</option>
                    <option value="0.5">少なめにする (0.5倍)</option>
                </select>
            </div>
            <div><label>イベント名</label><input type="text" id="split-title" value="会食"></div>
            <button onclick="playSplitGame()" class="btn-main" id="btn-play-game">計算を実行</button>
            
            <div class="split-res-box" id="split-res-box">
                <h3 style="font-size: 1rem; margin-bottom: 12px; color: var(--gold-premium);" id="res-game-title">📊 計算結果</h3>
                <div id="game-result-list" style="margin-bottom: 16px;"></div>
                <div id="my-share-log-zone" style="display: none;">
                    <button onclick="addSplitToCalendar()" class="btn-main" style="background: rgba(255,255,255,0.08); color: var(--text-main); border: 1px solid var(--panel-border);">自分の負担分を家計簿に記録</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 📱 フローティング・ナビゲーション -->

        return app.name.toLowerCase().includes(query) || app.keywords.includes(query);

    function playSplitGame() {
        const total = parseInt(document.getElementById('split-total').value, 10); const membersStr = document.getElementById('split-members').value;
        if (isNaN(total) || total <= 0 || !membersStr.trim()) return;
        const members = membersStr.split(',').map(m => m.trim()).filter(m => m.length > 0); if (members.length === 0) return;
        const resBox = document.getElementById('split-res-box'); const resTitle = document.getElementById('res-game-title'); const resList = document.getElementById('game-result-list');
        resList.innerHTML = ''; myCalculatedAmount = 0;

        if (activeGameMode === 'normal') {
            resTitle.innerHTML = "📊 割り勘計算結果"; const myRatio = parseFloat(document.getElementById('split-ratio').value);
            const totalShares = myRatio + (members.length - 1); const baseUnit = total / totalShares;
            members.forEach((m, i) => {
                let amt = m === '自分' ? Math.round(baseUnit * myRatio) : Math.round(baseUnit);
                if (m === '自分') myCalculatedAmount = amt; appendResultRow(resList, m, amt, m === '自分' ? '傾斜設定反映' : '');
            });
        } else if (activeGameMode === 'gochi') {
            resTitle.innerHTML = "👑 ゴチ当選者（全額支払い）";
            const godIndex = Math.floor(Math.random() * members.length);
            members.forEach((m, idx) => {
                const isGod = idx === godIndex; const amt = isGod ? total : 0;
                if (m === '自分' && isGod) myCalculatedAmount = total;
                appendResultRow(resList, m, amt, isGod ? '👑 お支払い' : '免除');
            });
        } else if (activeGameMode === 'roulette') {
            resTitle.innerHTML = "🎲 ターゲットルーレット結果"; if (members.length < 3) return alert('3名以上で実行してください。');
            let shuffled = [...members].sort(() => Math.random() - 0.5); const boomMember = shuffled[0]; const luckyMember = shuffled[1];
            const baseUnit = total / (members.length);
            members.forEach((m) => {
                let amt = 0; let badge = '';
                if (m === boomMember) { amt = Math.round(baseUnit * 2); badge = '❌ 負担2倍'; }
                else if (m === luckyMember) { amt = 0; badge = '✨ 負担ゼロ'; }
                else { amt = Math.round(baseUnit); badge = '通常'; }
                if (m === '自分') myCalculatedAmount = amt; appendResultRow(resList, m, amt, badge);
            });
        }
        resBox.style.display = 'block'; document.getElementById('my-share-log-zone').style.display = members.includes('自分') ? 'block' : 'none';
    }

    function calculateFinance() {
        let totalIncome = 0; let totalFixedExpense = 0; let totalFlexExpense = 0;
        let catTotals = {};
        let absoluteAllTimeAsset = 0;

        budgetData.forEach(item => {
            if (item.type === 'fixed-in') absoluteAllTimeAsset += item.amount; else absoluteAllTimeAsset -= item.amount;
            const itemDate = new Date(item.date);
            if (itemDate.getFullYear() === displayYear && itemDate.getMonth() === displayMonth) {
                if (item.type === 'fixed-in') totalIncome += item.amount;
                else if (item.type === 'fixed-out') totalFixedExpense += item.amount;
                else if (item.type === 'flex') {
                    totalFlexExpense += item.amount;
                    catTotals[item.category] = (catTotals[item.category] || 0) + item.amount;
                }
            }
        });

        document.getElementById('total-asset-val').innerText = `¥${absoluteAllTimeAsset.toLocaleString()}`;
        const totalExpense = totalFixedExpense + totalFlexExpense; const savings = totalIncome - totalExpense;
        document.getElementById('sum-income').innerText = `¥${totalIncome.toLocaleString()}`;
        document.getElementById('sum-expense').innerText = `¥${totalExpense.toLocaleString()}`;
        document.getElementById('sum-savings').innerText = `¥${savings.toLocaleString()}`;

        const monthlyTargetBudget = 500000;
        const percent = Math.min(Math.round((totalExpense / monthlyTargetBudget) * 100), 100);
        document.getElementById('budget-percent').innerText = `${percent}%`;
        document.getElementById('budget-progress').style.width = `${percent}%`;

        const aiText = document.getElementById('ai-advisor-text');
        if (totalExpense === 0) {
            aiText.innerText = "今月の支出はまだありません。非常にクリーンな状態です。";
        } else if (percent >= 90) {
            aiText.innerText = "予算使用率が90%を超えています。今月末に向けて少し支出をコントロールすることをおすすめします。";
        } else if (savings > 200000) {
            aiText.innerText = "順調に資産が増加傾向にあります。余剰資金は次の投資や貯蓄枠へ綺麗に分配可能です。";
        } else {
            aiText.innerText = "現在のキャッシュフローは安定しています。この調子を維持していきましょう。";
        }

        const remainingBudget = (totalIncome - totalFixedExpense) - totalFlexExpense;
        const totalDaysInMonth = new Date(displayYear, displayMonth + 1, 0).getDate();
        let remainingDays = totalDaysInMonth;
        if (displayYear === sysYear && displayMonth === sysMonth) {
            remainingDays = totalDaysInMonth - sysDay + 1;
            document.getElementById('suggest-desc').innerText = `(今月の残金 ÷ 残り ${remainingDays} 日)`;
        }
        let suggestAmount = 0; if (remainingBudget > 0 && remainingDays > 0) suggestAmount = Math.floor(remainingBudget / remainingDays);
        document.getElementById('suggest-amt').innerText = `¥${suggestAmount.toLocaleString()}`;

        const catListContainer = document.getElementById('category-summary-list'); catListContainer.innerHTML = ''; let hasFlexExpense = false;
        for (let cat in catTotals) {
            hasFlexExpense = true; const row = document.createElement('div'); row.className = 'cat-row';
            row.innerHTML = `<span>${cat}</span><strong>¥${catTotals[cat].toLocaleString()}</strong>`; catListContainer.appendChild(row);
        }
        if (!hasFlexExpense) catListContainer.innerHTML = '<p style="font-size:0.8rem; color:var(--text-muted); text-align:center; padding: 10px 0;">今月の変動費データはありません。</p>';

        updateExpenseChart(catTotals);
    }
